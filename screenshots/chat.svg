<svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="50%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#059669"/>
    <stop offset="100%" stop-color="#10b981"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1000" height="680" fill="#f1f5f9"/>

<!-- Header -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="#ffffff" fill-opacity="0.18"/>
<text x="41" y="41" text-anchor="middle" font-size="22" fill="#f59e0b">&#9889;</text>
<text x="74" y="34" font-size="17" font-weight="800" fill="#ffffff">FastMessenger</text>
<text x="74" y="50" font-size="9" fill="#c4b5fd" letter-spacing="1">CONNECT &amp; CHAT</text>
<!-- User pill -->
<rect x="848" y="16" width="136" height="36" rx="18" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
<circle cx="873" cy="34" r="13" fill="url(#ag)"/>
<text x="873" y="39" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">M</text>
<text x="893" y="31" font-size="12" font-weight="700" fill="#ffffff">MyUser</text>
<text x="893" y="45" font-size="9" fill="#c4b5fd">&#9679; Online</text>

<!-- Tab bar -->
<rect y="68" width="1000" height="48" fill="#ffffff"/>
<line x1="0" y1="116" x2="1000" y2="116" stroke="#e2e8f0" stroke-width="1"/>
<text x="83"  y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Home</text>
<text x="233" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Friends</text>
<text x="383" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Members</text>
<text x="533" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">Messages</text>
<rect x="490" y="113" width="86" height="3" rx="2" fill="#4f46e5"/>
<text x="683" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Profile</text>
<text x="830" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Logout</text>

<!-- Page title -->
<text x="24" y="144" font-size="18" font-weight="700" fill="#1e293b">alice's Messages</text>
<rect x="24" y="149" width="150" height="3" rx="2" fill="#4f46e5"/>

<!-- Profile strip card -->
<rect x="16" y="158" width="968" height="70" rx="14" fill="#ffffff" stroke="#f1f5f9" stroke-width="1"/>
<circle cx="53" cy="193" r="23" fill="url(#ag)"/>
<text x="53" y="199" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">A</text>
<text x="86" y="188" font-size="14" font-weight="700" fill="#1e293b">alice</text>
<text x="86" y="207" font-size="11" fill="#64748b">Leave a message or start a private chat with alice</text>

<!-- Message form card -->
<rect x="16" y="238" width="968" height="110" rx="14" fill="#ffffff" stroke="#f1f5f9" stroke-width="1"/>
<text x="32" y="260" font-size="12" font-weight="600" fill="#1e293b">Leave a Message for alice</text>
<!-- Public toggle (active) -->
<rect x="32" y="268" width="86" height="28" rx="7" fill="#4f46e5"/>
<text x="75" y="287" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Public</text>
<!-- Private toggle -->
<rect x="124" y="268" width="86" height="28" rx="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="167" y="287" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Private</text>
<!-- Textarea -->
<rect x="32" y="304" width="762" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="48" y="327" font-size="11" fill="#94a3b8">Write your message...</text>
<!-- Send button -->
<rect x="802" y="304" width="90" height="36" rx="8" fill="#4f46e5"/>
<text x="847" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Send</text>
<!-- Attach icon boxes -->
<rect x="900" y="304" width="38" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="919" y="328" text-anchor="middle" font-size="15" fill="#94a3b8">+</text>
<rect x="946" y="304" width="38" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="965" y="328" text-anchor="middle" font-size="13" fill="#94a3b8">mic</text>

<!-- Chat window background -->
<rect x="16" y="358" width="968" height="306" rx="12" fill="#edf0f4" stroke="#e2e8f0" stroke-width="1"/>

<!-- ── Received bubble 1 ── -->
<rect x="28" y="372" width="280" height="48" rx="16" fill="#ffffff"/>
<text x="44" y="391" font-size="10" font-weight="700" fill="#4f46e5">alice</text>
<text x="44" y="409" font-size="12" fill="#1e293b">Hey! How are you doing today?</text>
<text x="300" y="413" text-anchor="end" font-size="9" fill="#94a3b8">9:10 am</text>

<!-- ── Sent bubble 1 ── -->
<rect x="686" y="432" width="296" height="48" rx="16" fill="#4f46e5"/>
<text x="702" y="452" font-size="12" fill="#ffffff">I am doing great, thanks for asking!</text>
<text x="974" y="473" text-anchor="end" font-size="9" fill="#c4b5fd">9:12 am  done</text>

<!-- ── Received bubble 2 ── -->
<rect x="28" y="494" width="320" height="48" rx="16" fill="#ffffff"/>
<text x="44" y="513" font-size="10" font-weight="700" fill="#4f46e5">alice</text>
<text x="44" y="531" font-size="12" fill="#1e293b">Have you tried the voice message feature?</text>
<text x="340" y="535" text-anchor="end" font-size="9" fill="#94a3b8">9:13 am</text>

<!-- ── Sent bubble 3 — private green ── -->
<rect x="626" y="556" width="356" height="60" rx="16" fill="url(#sg)"/>
<!-- Lock badge -->
<rect x="640" y="563" width="54" height="16" rx="8" fill="#ffffff" fill-opacity="0.2"/>
<text x="667" y="574" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Private</text>
<text x="642" y="594" font-size="12" fill="#ffffff">Yes! The mic feature is super smooth.</text>
<text x="974" y="610" text-anchor="end" font-size="9" fill="#a7f3d0">9:15 am  done</text>

<!-- ── Received bubble 3 ── -->
<rect x="28" y="630" width="196" height="30" rx="14" fill="#ffffff"/>
<text x="44" y="650" font-size="12" fill="#1e293b">Totally agree!</text>
<text x="216" y="654" text-anchor="end" font-size="9" fill="#94a3b8">9:16 am</text>
</svg>
