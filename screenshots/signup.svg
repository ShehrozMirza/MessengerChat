<svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="50%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <filter id="sh">
    <feDropShadow dx="0" dy="2" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.18"/>
  </filter>
  <filter id="pop">
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.12"/>
  </filter>
  <clipPath id="bar-clip">
    <rect x="0" y="0" width="380" height="6" rx="3"/>
  </clipPath>
</defs>

<!-- Page background -->
<rect width="1000" height="820" fill="#f1f5f9"/>

<!-- ── Header ── -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="20" fill="#f59e0b">⚡</text>
<text x="74" y="33" font-size="16" font-weight="800" fill="white">FastMessenger</text>
<text x="74" y="49" font-size="8.5" fill="rgba(255,255,255,0.65)" letter-spacing="1">CONNECT &amp; CHAT</text>

<!-- ── Tab Bar ── -->
<rect y="68" width="1000" height="48" fill="white" filter="url(#pop)"/>
<text x="340" y="98" text-anchor="middle" font-size="11" fill="#64748b">⌂  Home</text>
<text x="500" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">👤  Sign Up</text>
<rect x="460" y="113" width="80" height="3" rx="1.5" fill="#4f46e5"/>
<text x="660" y="98" text-anchor="middle" font-size="11" fill="#64748b">⇥  Log In</text>

<!-- ── Auth Card ── -->
<rect x="270" y="132" width="460" height="662" rx="16" fill="white" filter="url(#sh)"/>

<!-- Person icon circle -->
<circle cx="500" cy="183" r="34" fill="#eff6ff"/>
<!-- Person icon SVG path approximation -->
<circle cx="500" cy="172" r="12" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
<path d="M476 200 Q476 188 500 188 Q524 188 524 200" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="517" cy="163" r="5" fill="#4f46e5"/>
<line x1="517" y1="155" x2="521" y2="151" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
<line x1="522" y1="158" x2="527" y2="157" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>

<text x="500" y="235" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">Create Account</text>
<text x="500" y="255" text-anchor="middle" font-size="12.5" fill="#64748b">Join FastMessenger today</text>

<!-- ── Username ── -->
<text x="295" y="284" font-size="13" font-weight="600" fill="#1e293b">Username</text>
<rect x="295" y="292" width="410" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="312" y="317" font-size="13.5" fill="#1e293b">Ajay</text>

<!-- Available tick -->
<circle cx="307" cy="340" r="7" fill="none" stroke="#10b981" stroke-width="1.8"/>
<text x="307" y="344.5" text-anchor="middle" font-size="9" fill="#10b981">✓</text>
<text x="320" y="345" font-size="12" fill="#10b981">Username "Ajay" is available</text>

<!-- ── Password ── -->
<text x="295" y="370" font-size="13" font-weight="600" fill="#1e293b">Password</text>
<rect x="295" y="378" width="410" height="40" rx="8" fill="white" stroke="#818cf8" stroke-width="2"/>
<text x="312" y="403" font-size="14" fill="#1e293b" letter-spacing="2">••••••••••</text>
<!-- Eye icon -->
<circle cx="688" cy="398" r="8" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
<circle cx="688" cy="398" r="3" fill="#94a3b8"/>

<!-- ── Password Popover ── -->
<rect x="295" y="425" width="410" height="188" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#pop)"/>

<!-- "PASSWORD REQUIREMENTS" label -->
<text x="312" y="447" font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="1">PASSWORD REQUIREMENTS</text>

<!-- Strength bar track -->
<rect x="312" y="455" width="376" height="6" rx="3" fill="#e2e8f0"/>
<!-- Strength bar fill — 60% = Fair = #eab308 -->
<rect x="312" y="455" width="226" height="6" rx="3" fill="#eab308"/>

<!-- Strength label block (Fair = yellow bg, text same color = invisible per CSS) -->
<rect x="312" y="467" width="376" height="22" rx="4" fill="#eab308"/>

<!-- Checklist -->
<!-- ✅ At least 8 characters -->
<circle cx="323" cy="504" r="7.5" fill="#10b981"/>
<text x="323" y="508" text-anchor="middle" font-size="9" fill="white">✓</text>
<text x="337" y="508" font-size="12" fill="#10b981">At least 8 characters</text>

<!-- ⚪ One uppercase letter -->
<circle cx="323" cy="521" r="7.5" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
<text x="337" y="525" font-size="12" fill="#64748b">One uppercase letter</text>

<!-- ✅ One lowercase letter -->
<circle cx="323" cy="538" r="7.5" fill="#10b981"/>
<text x="323" y="542" text-anchor="middle" font-size="9" fill="white">✓</text>
<text x="337" y="542" font-size="12" fill="#10b981">One lowercase letter</text>

<!-- ✅ One number -->
<circle cx="323" cy="555" r="7.5" fill="#10b981"/>
<text x="323" y="559" text-anchor="middle" font-size="9" fill="white">✓</text>
<text x="337" y="559" font-size="12" fill="#10b981">One number</text>

<!-- ⚪ One special character -->
<circle cx="323" cy="572" r="7.5" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
<text x="337" y="576" font-size="12" fill="#64748b">One special character (!@#$...)</text>

<!-- ── Gender ── -->
<text x="295" y="634" font-size="13" font-weight="600" fill="#1e293b">Gender</text>

<!-- Male card — selected (blue) -->
<rect x="295" y="643" width="196" height="78" rx="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<!-- Male symbol -->
<circle cx="393" cy="668" r="11" fill="none" stroke="#1d4ed8" stroke-width="2.2"/>
<line x1="401" y1="660" x2="408" y2="653" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/>
<line x1="403" y1="653" x2="408" y2="653" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/>
<line x1="408" y1="653" x2="408" y2="658" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/>
<text x="393" y="703" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Male</text>

<!-- Female card — unselected -->
<rect x="509" y="643" width="196" height="78" rx="13" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<!-- Female symbol -->
<circle cx="607" cy="665" r="11" fill="none" stroke="#94a3b8" stroke-width="2.2"/>
<line x1="607" y1="676" x2="607" y2="686" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<line x1="601" y1="681" x2="613" y2="681" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<text x="607" y="703" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">Female</text>

<!-- ── Sign Up Button ── -->
<rect x="295" y="737" width="410" height="44" rx="9" fill="#4f46e5"/>
<text x="500" y="764" text-anchor="middle" font-size="14.5" font-weight="600" fill="white">👤  Sign Up</text>

<!-- Log in link -->
<text x="500" y="798" text-anchor="middle" font-size="12.5" fill="#64748b">Already have an account? <tspan font-weight="700" fill="#4f46e5">Log In</tspan></text>
</svg>
