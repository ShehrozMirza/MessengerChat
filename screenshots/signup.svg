<svg viewBox="0 0 520 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
<defs>
  <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#94a3b8" flood-opacity="0.15"/>
  </filter>
  <linearGradient id="maleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#eff6ff"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="520" height="680" fill="#f1f5f9"/>

<!-- Card -->
<rect x="16" y="16" width="488" height="648" rx="22" fill="white" filter="url(#shadow)"/>

<!-- Person-plus icon (outline style, pure SVG) -->
<g stroke="#4f46e5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="246" cy="88" r="16"/>
  <!-- body / shoulders arc -->
  <path d="M218,122 Q218,108 246,108 Q274,108 274,122"/>
  <!-- plus sign -->
  <line x1="280" y1="84" x2="298" y2="84"/>
  <line x1="289" y1="75" x2="289" y2="93"/>
</g>

<!-- Title -->
<text x="260" y="158" text-anchor="middle" font-size="26" font-weight="800" fill="#1e293b">Create Account</text>

<!-- Subtitle -->
<text x="260" y="180" text-anchor="middle" font-size="13.5" fill="#f59e0b">Join FastMessenger today</text>

<!-- Username label -->
<text x="52" y="222" font-size="13.5" font-weight="600" fill="#1e293b">Username</text>

<!-- Username input box -->
<rect x="52" y="230" width="416" height="46" rx="10" fill="white" stroke="#dee2e6" stroke-width="1.5"/>

<!-- Password label -->
<text x="52" y="302" font-size="13.5" font-weight="600" fill="#1e293b">Password</text>

<!-- Password input box -->
<rect x="52" y="310" width="416" height="46" rx="10" fill="white" stroke="#dee2e6" stroke-width="1.5"/>

<!-- Eye icon in password field (pure SVG) -->
<g stroke="#94a3b8" stroke-width="1.8" fill="none" transform="translate(441, 333)">
  <ellipse cx="0" cy="0" rx="11" ry="7"/>
  <circle cx="0" cy="0" r="3" fill="#94a3b8" stroke="none"/>
</g>

<!-- Gender label -->
<text x="52" y="384" font-size="13.5" font-weight="600" fill="#1e293b">Gender</text>

<!-- Male card (selected) -->
<rect x="52" y="394" width="194" height="90" rx="14" fill="url(#maleGrad)" stroke="#3b82f6" stroke-width="2.2"/>
<!-- Male symbol (♂) — circle + arrow, pure SVG -->
<circle cx="149" cy="425" r="13" stroke="#1d4ed8" stroke-width="2.2" fill="none"/>
<line x1="158" y1="416" x2="168" y2="406" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/>
<line x1="162" y1="406" x2="168" y2="406" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/>
<line x1="168" y1="406" x2="168" y2="412" stroke="#1d4ed8" stroke-width="2.2" stroke-linecap="round"/>
<text x="149" y="462" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Male</text>

<!-- Female card (unselected) -->
<rect x="258" y="394" width="194" height="90" rx="14" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
<!-- Female symbol (♀) — circle + cross, pure SVG -->
<circle cx="355" cy="421" r="13" stroke="#94a3b8" stroke-width="2.2" fill="none"/>
<line x1="355" y1="434" x2="355" y2="448" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<line x1="347" y1="441" x2="363" y2="441" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<text x="355" y="462" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">Female</text>

<!-- Sign Up button -->
<rect x="52" y="506" width="416" height="52" rx="10" fill="#4f46e5"/>
<!-- Person icon in button (pure SVG) -->
<g stroke="white" stroke-width="2" fill="none" stroke-linecap="round" transform="translate(168, 521)">
  <circle cx="0" cy="6" r="5.5"/>
  <path d="M-9,20 Q-9,14 0,14 Q9,14 9,20"/>
  <line x1="14" y1="6" x2="22" y2="6"/>
  <line x1="18" y1="2" x2="18" y2="10"/>
</g>
<text x="272" y="538" text-anchor="middle" font-size="15" font-weight="600" fill="white">Sign Up</text>

<!-- Footer -->
<text x="260" y="590" text-anchor="middle" font-size="13" fill="#64748b">Already have an account? <tspan font-weight="700" fill="#4f46e5">Log In</tspan></text>
</svg>
