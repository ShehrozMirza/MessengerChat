<svg viewBox="0 0 1000 860" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="50%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <linearGradient id="maleSel" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#eff6ff"/>
    <stop offset="100%" stop-color="#dbeafe"/>
  </linearGradient>
  <linearGradient id="femaleSel" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fdf2f8"/>
    <stop offset="100%" stop-color="#fce7f3"/>
  </linearGradient>
  <filter id="sh">
    <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#94a3b8" flood-opacity="0.16"/>
  </filter>
  <filter id="pop">
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.12"/>
  </filter>
  <filter id="gsh">
    <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#3b82f6" flood-opacity="0.18"/>
  </filter>
</defs>

<!-- Page background -->
<rect width="1000" height="860" fill="#f1f5f9"/>

<!-- ── Header ── -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="20" fill="#f59e0b">⚡</text>
<text x="74" y="33" font-size="16" font-weight="800" fill="white">FastMessenger</text>
<text x="74" y="49" font-size="8.5" fill="rgba(255,255,255,0.65)" letter-spacing="1">CONNECT &amp; CHAT</text>

<!-- ── Tab Bar ── -->
<rect y="68" width="1000" height="48" fill="white" filter="url(#pop)"/>
<text x="340" y="98" text-anchor="middle" font-size="11" fill="#64748b">⌂  Home</text>
<text x="500" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">Sign Up</text>
<rect x="460" y="113" width="80" height="3" rx="1.5" fill="#4f46e5"/>
<text x="660" y="98" text-anchor="middle" font-size="11" fill="#64748b">⇥  Log In</text>

<!-- ── Auth Card ── -->
<rect x="265" y="136" width="470" height="694" rx="16" fill="white" filter="url(#sh)"/>

<!-- Person-plus icon (pure SVG, no emoji) -->
<circle cx="500" cy="177" r="22" fill="#eff6ff"/>
<!-- head -->
<circle cx="497" cy="170" r="6" fill="#4f46e5"/>
<!-- body arc -->
<path d="M485,188 Q485,179 497,179 Q509,179 509,188 Z" fill="#4f46e5"/>
<!-- Plus badge -->
<circle cx="516" cy="163" r="8" fill="#4f46e5"/>
<rect x="512" y="162" width="8" height="2" rx="1" fill="white"/>
<rect x="515" y="159" width="2" height="8" rx="1" fill="white"/>

<text x="500" y="218" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">Create Account</text>
<text x="500" y="238" text-anchor="middle" font-size="12.5" fill="#64748b">Join FastMessenger today</text>

<!-- ── Username ── -->
<text x="285" y="267" font-size="12.5" font-weight="600" fill="#1e293b">Username</text>
<rect x="285" y="275" width="430" height="40" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
<text x="300" y="300" font-size="13" fill="#1e293b">Ajay</text>
<!-- Available tick -->
<text x="285" y="328" font-size="11.5" fill="#10b981">✓  Username "Ajay" is available</text>

<!-- ── Password ── -->
<text x="285" y="354" font-size="12.5" font-weight="600" fill="#1e293b">Password</text>
<rect x="285" y="362" width="430" height="40" rx="8" fill="white" stroke="#4f46e5" stroke-width="2"/>
<text x="300" y="388" font-size="14" fill="#1e293b" letter-spacing="2">••••••••••</text>
<!-- Eye icon -->
<text x="695" y="388" text-anchor="middle" font-size="15" fill="#94a3b8">👁</text>

<!-- ── Password Popover ── -->
<rect x="285" y="408" width="430" height="192" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#pop)"/>
<text x="300" y="430" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1">PASSWORD REQUIREMENTS</text>

<!-- Strength bar track -->
<rect x="300" y="438" width="396" height="7" rx="3.5" fill="#e2e8f0"/>
<!-- Strength bar fill — 60% Fair = yellow -->
<rect x="300" y="438" width="238" height="7" rx="3.5" fill="#eab308"/>

<!-- Strength label: Fair -->
<rect x="300" y="451" width="396" height="22" rx="5" fill="#fef9c3"/>
<text x="498" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">Fair</text>

<!-- Checklist items -->
<!-- ✅ At least 8 characters -->
<circle cx="313" cy="494" r="8" fill="#10b981"/>
<text x="313" y="498.5" text-anchor="middle" font-size="9.5" fill="white">✓</text>
<text x="328" y="498" font-size="12" fill="#10b981">At least 8 characters</text>

<!-- ❌ One uppercase letter -->
<circle cx="313" cy="513" r="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
<text x="313" y="517.5" text-anchor="middle" font-size="9.5" fill="#d1d5db">✗</text>
<text x="328" y="517" font-size="12" fill="#64748b">One uppercase letter</text>

<!-- ✅ One lowercase letter -->
<circle cx="313" cy="532" r="8" fill="#10b981"/>
<text x="313" y="536.5" text-anchor="middle" font-size="9.5" fill="white">✓</text>
<text x="328" y="536" font-size="12" fill="#10b981">One lowercase letter</text>

<!-- ✅ One number -->
<circle cx="313" cy="551" r="8" fill="#10b981"/>
<text x="313" y="555.5" text-anchor="middle" font-size="9.5" fill="white">✓</text>
<text x="328" y="555" font-size="12" fill="#10b981">One number</text>

<!-- ❌ One special character -->
<circle cx="313" cy="570" r="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
<text x="313" y="574.5" text-anchor="middle" font-size="9.5" fill="#d1d5db">✗</text>
<text x="328" y="574" font-size="12" fill="#64748b">One special character (!@#$...)</text>

<!-- ── Gender ── -->
<text x="285" y="623" font-size="12.5" font-weight="600" fill="#1e293b">Gender</text>

<!-- Male card — selected (blue gradient) -->
<rect x="285" y="632" width="203" height="82" rx="14" fill="url(#maleSel)" stroke="#3b82f6" stroke-width="2" filter="url(#gsh)"/>
<text x="386" y="660" text-anchor="middle" font-size="26" fill="#1d4ed8">♂</text>
<text x="386" y="700" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Male</text>

<!-- Female card — unselected -->
<rect x="492" y="632" width="203" height="82" rx="14" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
<text x="593" y="660" text-anchor="middle" font-size="26" fill="#94a3b8">♀</text>
<text x="593" y="700" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">Female</text>

<!-- ── Sign Up Button ── -->
<rect x="285" y="730" width="430" height="44" rx="8" fill="#4f46e5"/>
<text x="500" y="758" text-anchor="middle" font-size="14" font-weight="600" fill="white">Sign Up</text>

<!-- Log in link -->
<text x="500" y="806" text-anchor="middle" font-size="12.5" fill="#64748b">Already have an account? <tspan font-weight="700" fill="#4f46e5">Log In</tspan></text>
</svg>
