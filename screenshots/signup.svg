<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.12"/></filter>
  <filter id="pop"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#4f46e5" flood-opacity="0.11"/></filter>
</defs>

<rect width="1000" height="660" fill="#f1f5f9"/>

<!-- Header -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="22" fill="#f59e0b">⚡</text>
<text x="74" y="34" font-size="17" font-weight="800" fill="white">FastMessenger</text>
<text x="74" y="50" font-size="9" fill="rgba(255,255,255,0.65)" letter-spacing="0.8">CONNECT &amp; CHAT</text>

<!-- Guest Tab Bar -->
<rect y="68" width="1000" height="48" fill="white"/>
<text x="500" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⌂  Home</text>
<text x="640" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">👤  Sign Up</text>
<rect x="600" y="113" width="80" height="3" rx="2" fill="#4f46e5"/>
<text x="780" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⇥  Log In</text>

<!-- Auth Card -->
<rect x="270" y="128" width="460" height="500" rx="14" fill="white" filter="url(#sh)"/>

<!-- Icon -->
<circle cx="500" cy="178" r="32" fill="rgba(79,70,229,0.1)"/>
<text x="500" y="188" text-anchor="middle" font-size="26" fill="#4f46e5">👤</text>

<text x="500" y="228" text-anchor="middle" font-size="21" font-weight="800" fill="#1e293b">Create Account</text>
<text x="500" y="248" text-anchor="middle" font-size="12" fill="#64748b">Join FastMessenger today</text>

<!-- Username field -->
<text x="294" y="276" font-size="12" font-weight="600" fill="#1e293b">Username</text>
<rect x="294" y="284" width="412" height="38" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="310" y="308" font-size="13" fill="#1e293b">newuser</text>
<text x="294" y="333" font-size="11" fill="#10b981">✓  Username "newuser" is available</text>

<!-- Password field -->
<text x="294" y="356" font-size="12" font-weight="600" fill="#1e293b">Password</text>
<rect x="294" y="364" width="412" height="38" rx="8" fill="#f8fafc" stroke="#818cf8" stroke-width="1.8"/>
<text x="310" y="388" font-size="13" fill="#1e293b">••••••••••</text>
<text x="692" y="388" text-anchor="end" font-size="14" fill="#94a3b8">👁</text>

<!-- Password Strength Popover -->
<rect x="294" y="410" width="412" height="150" rx="13" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#pop)"/>
<text x="310" y="430" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="0.6">PASSWORD REQUIREMENTS</text>
<!-- Strength bar background -->
<rect x="310" y="438" width="378" height="6" rx="3" fill="#e2e8f0"/>
<!-- Strength bar fill (80% = Good) -->
<rect x="310" y="438" width="302" height="6" rx="3" fill="#10b981"/>
<text x="310" y="457" font-size="11" font-weight="700" fill="#10b981">Good</text>
<!-- Checklist -->
<text x="310" y="477" font-size="11" fill="#10b981">✓  At least 8 characters</text>
<text x="310" y="494" font-size="11" fill="#10b981">✓  One uppercase letter</text>
<text x="310" y="511" font-size="11" fill="#10b981">✓  One lowercase letter</text>
<text x="310" y="528" font-size="11" fill="#64748b">✗  One number</text>
<text x="310" y="545" font-size="11" fill="#10b981">✓  One special character (!@#$...)</text>

<!-- Sign Up button -->
<rect x="294" y="572" width="412" height="42" rx="8" fill="#4f46e5"/>
<text x="500" y="598" text-anchor="middle" font-size="14" font-weight="600" fill="white">👤 Sign Up</text>

<!-- Log in link -->
<text x="500" y="640" text-anchor="middle" font-size="12" fill="#64748b">Already have an account? <tspan font-weight="700" fill="#4f46e5">Log In</tspan></text>
</svg>
