<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.12"/></filter>
</defs>

<rect width="1000" height="720" fill="#f1f5f9"/>

<!-- Header -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="22" fill="#f59e0b">⚡</text>
<text x="74" y="34" font-size="17" font-weight="800" fill="white">FastMessenger</text>
<text x="74" y="50" font-size="9" fill="rgba(255,255,255,0.65)" letter-spacing="0.8">CONNECT &amp; CHAT</text>

<!-- Guest Tab Bar -->
<rect y="68" width="1000" height="48" fill="white"/>
<text x="500" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⌂  Home</text>
<text x="640" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">👤  Sign Up</text>
<rect x="600" y="113" width="80" height="3" rx="2" fill="#4f46e5"/>
<text x="780" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⇥  Log In</text>

<!-- Auth Card -->
<rect x="270" y="130" width="460" height="562" rx="14" fill="white" filter="url(#sh)"/>

<!-- Icon -->
<circle cx="500" cy="178" r="30" fill="rgba(79,70,229,0.1)"/>
<text x="500" y="188" text-anchor="middle" font-size="24" fill="#4f46e5">👤</text>

<text x="500" y="226" text-anchor="middle" font-size="21" font-weight="800" fill="#1e293b">Create Account</text>
<text x="500" y="246" text-anchor="middle" font-size="12" fill="#64748b">Join FastMessenger today</text>

<!-- Username field -->
<text x="294" y="273" font-size="12" font-weight="600" fill="#1e293b">Username</text>
<rect x="294" y="281" width="412" height="38" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="310" y="305" font-size="13" fill="#1e293b">newuser</text>
<text x="294" y="330" font-size="11" fill="#10b981">✓  Username "newuser" is available</text>

<!-- Password field -->
<text x="294" y="354" font-size="12" font-weight="600" fill="#1e293b">Password</text>
<rect x="294" y="362" width="412" height="38" rx="8" fill="#f8fafc" stroke="#818cf8" stroke-width="1.8"/>
<text x="310" y="386" font-size="13" fill="#1e293b">••••••••••</text>
<text x="692" y="386" text-anchor="end" font-size="14" fill="#94a3b8">👁</text>

<!-- Gender label -->
<text x="294" y="418" font-size="12" font-weight="600" fill="#1e293b">Gender</text>

<!-- Male card (selected — blue) -->
<rect x="294" y="426" width="196" height="72" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="392" y="458" text-anchor="middle" font-size="24" fill="#1d4ed8">♂</text>
<text x="392" y="480" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Male</text>

<!-- Female card (unselected) -->
<rect x="510" y="426" width="196" height="72" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="608" y="458" text-anchor="middle" font-size="24" fill="#94a3b8">♀</text>
<text x="608" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Female</text>

<!-- Sign Up button -->
<rect x="294" y="518" width="412" height="44" rx="8" fill="#4f46e5"/>
<text x="500" y="545" text-anchor="middle" font-size="14" font-weight="600" fill="white">👤  Sign Up</text>

<!-- Log in link -->
<text x="500" y="594" text-anchor="middle" font-size="12" fill="#64748b">Already have an account? <tspan font-weight="700" fill="#4f46e5">Log In</tspan></text>

<!-- Strength bar hint below password -->
<rect x="294" y="406" width="196" height="5" rx="2.5" fill="#e2e8f0"/>
<rect x="294" y="406" width="156" height="5" rx="2.5" fill="#10b981"/>
<text x="498" y="413" text-anchor="end" font-size="9" font-weight="600" fill="#10b981">Good</text>
</svg>
