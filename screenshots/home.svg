<text x="773" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">5</text>
<text x="773" y="283" text-anchor="middle" font-size="11" fill="#64748b">Friends</text>
<text x="877" y="268" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">12</text>
<text x="877" y="283" text-anchor="middle" font-size="11" fill="#64748b">Messages</text>
<!-- Edit button -->
<rect x="747" y="295" width="156" height="20" rx="7" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
<text x="825" y="309" text-anchor="middle" font-size="11" font-weight="500" fill="#4f46e5">✎ Edit Profile</text>

<!-- Action Buttons -->
<rect x="666" y="334" width="318" height="44" rx="10" fill="#4f46e5"/>
<text x="825" y="361" text-anchor="middle" font-size="13" font-weight="600" fill="white">👥 Members</text>

<rect x="666" y="386" width="318" height="44" rx="10" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
<text x="825" y="413" text-anchor="middle" font-size="13" font-weight="600" fill="#4f46e5">♥ Friends</text>

<rect x="666" y="438" width="318" height="44" rx="10" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
<text x="825" y="465" text-anchor="middle" font-size="13" font-weight="600" fill="#4f46e5">✉ Messages</text>

<!-- Footer -->
<text x="500" y="624" text-anchor="middle" font-size="11" fill="#94a3b8">FastMessenger — Lightning-fast social networking</text>
</svg>
