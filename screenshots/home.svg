<text x="614" y="392" font-size="11" fill="#4f46e5" text-anchor="end">View all</text>

<!-- Private row 1 -->
<circle cx="44" cy="434" r="18" fill="url(#ag)"/>
<text x="44" y="439" text-anchor="middle" font-size="12" font-weight="700" fill="white">A</text>
<text x="70" y="429" font-size="12" font-weight="600" fill="#1e293b">alice <tspan font-size="9" fill="#059669">🔒</tspan></text>
<text x="70" y="445" font-size="11" fill="#64748b">Hey, did you see my last message?</text>
<text x="636" y="429" font-size="10" fill="#94a3b8" text-anchor="end">2:35 pm</text>
<text x="636" y="445" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>
<line x1="16" y1="454" x2="650" y2="454" stroke="#f1f5f9" stroke-width="1"/>

<!-- Private row 2 -->
<circle cx="44" cy="476" r="18" fill="url(#ag)"/>
<text x="44" y="481" text-anchor="middle" font-size="12" font-weight="700" fill="white">B</text>
<text x="70" y="471" font-size="12" font-weight="600" fill="#1e293b">bob123 <tspan font-size="9" fill="#059669">🔒</tspan></text>
<text x="70" y="487" font-size="11" fill="#64748b"><tspan fill="#4f46e5" font-weight="600">You:</tspan> Sure, let's catch up later!</text>
<text x="636" y="471" font-size="10" fill="#94a3b8" text-anchor="end">1:50 pm</text>
<text x="636" y="487" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>
<line x1="16" y1="496" x2="650" y2="496" stroke="#f1f5f9" stroke-width="1"/>

<!-- Private row 3 -->
<circle cx="44" cy="518" r="18" fill="url(#ag)"/>
<text x="44" y="523" text-anchor="middle" font-size="12" font-weight="700" fill="white">C</text>
<text x="70" y="513" font-size="12" font-weight="600" fill="#1e293b">charlie <tspan font-size="9" fill="#059669">🔒</tspan></text>
<text x="70" y="529" font-size="11" fill="#64748b">🖼 Image</text>
<text x="636" y="513" font-size="10" fill="#94a3b8" text-anchor="end">12:15 pm</text>
<text x="636" y="529" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>
<line x1="16" y1="538" x2="650" y2="538" stroke="#f1f5f9" stroke-width="1"/>

<!-- Private row 4 -->
<circle cx="44" cy="560" r="18" fill="url(#ag)"/>
<text x="44" y="565" text-anchor="middle" font-size="12" font-weight="700" fill="white">E</text>
<text x="70" y="555" font-size="12" font-weight="600" fill="#1e293b">evan <tspan font-size="9" fill="#059669">🔒</tspan></text>
<text x="70" y="571" font-size="11" fill="#64748b">Welcome to FastMessenger!</text>
<text x="636" y="555" font-size="10" fill="#94a3b8" text-anchor="end">9:20 am</text>
<text x="636" y="571" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>

<!-- ── RIGHT COLUMN ── -->

<!-- Profile Card -->
<rect x="666" y="126" width="318" height="196" rx="14" fill="white" filter="url(#sh)"/>
<circle cx="825" cy="190" r="36" fill="url(#ag)"/>
<text x="825" y="198" text-anchor="middle" font-size="22" font-weight="700" fill="white">M</text>
<text x="825" y="247" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">MyUser</text>
