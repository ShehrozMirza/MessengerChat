<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/></filter>
</defs>

<!-- Background -->
<rect width="1000" height="640" fill="#f1f5f9"/>

<!-- Header -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="22" fill="#f59e0b">⚡</text>
<text x="74" y="34" font-size="17" font-weight="800" fill="white" letter-spacing="-0.3">FastMessenger</text>
<text x="74" y="50" font-size="9" fill="rgba(255,255,255,0.65)" letter-spacing="0.8">CONNECT &amp; CHAT</text>
<!-- User pill -->
<rect x="852" y="16" width="132" height="36" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
<circle cx="876" cy="34" r="13" fill="url(#ag)"/>
<text x="876" y="39" text-anchor="middle" font-size="12" font-weight="700" fill="white">M</text>
<text x="893" y="31" font-size="12" font-weight="700" fill="white">MyUser</text>
<text x="893" y="44" font-size="9" fill="rgba(255,255,255,0.7)">● Online</text>

<!-- Tab Bar -->
<rect y="68" width="1000" height="48" fill="white" filter="url(#sh)"/>
<!-- Home (active) -->
<text x="83" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">⌂  Home</text>
<rect x="43" y="113" width="80" height="3" rx="2" fill="#4f46e5"/>
<!-- Friends -->
<text x="233" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">♥  Friends</text>
<!-- Members -->
<text x="383" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">👥  Members</text>
<!-- Messages -->
<text x="533" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">✉  Messages</text>
<!-- Profile -->
<text x="683" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">👤  Profile</text>
<!-- Logout -->
<text x="820" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⇥  Logout</text>

<!-- ── LEFT COLUMN ── -->

<!-- Public Messages Card -->
<rect x="16" y="126" width="634" height="226" rx="14" fill="white" filter="url(#sh)"/>
<!-- Card header -->
<rect x="16" y="126" width="634" height="46" rx="14" fill="white"/>
<rect x="16" y="154" width="634" height="18" fill="white"/>
<line x1="16" y1="172" x2="650" y2="172" stroke="#e2e8f0" stroke-width="1"/>
<text x="36" y="154" font-size="13" font-weight="700" fill="#1e293b">🌐  Recent Public Messages</text>
<text x="614" y="154" font-size="11" fill="#4f46e5" text-anchor="end">View all</text>

<!-- Message row 1 -->
<circle cx="44" cy="196" r="18" fill="url(#ag)"/>
<text x="44" y="201" text-anchor="middle" font-size="12" font-weight="700" fill="white">A</text>
<text x="70" y="191" font-size="12" font-weight="600" fill="#1e293b">alice</text>
<text x="70" y="207" font-size="11" fill="#64748b">Hey everyone! Just joined FastMessenger 🚀</text>
<text x="636" y="191" font-size="10" fill="#94a3b8" text-anchor="end">2:30 pm</text>
<text x="636" y="207" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>
<line x1="16" y1="216" x2="650" y2="216" stroke="#f1f5f9" stroke-width="1"/>

<!-- Message row 2 -->
<circle cx="44" cy="238" r="18" fill="url(#ag)"/>
<text x="44" y="243" text-anchor="middle" font-size="12" font-weight="700" fill="white">B</text>
<text x="70" y="233" font-size="12" font-weight="600" fill="#1e293b">bob123</text>
<text x="70" y="249" font-size="11" fill="#64748b">Anyone up for a group chat tonight?</text>
<text x="636" y="233" font-size="10" fill="#94a3b8" text-anchor="end">1:45 pm</text>
<text x="636" y="249" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>
<line x1="16" y1="258" x2="650" y2="258" stroke="#f1f5f9" stroke-width="1"/>

<!-- Message row 3 -->
<circle cx="44" cy="280" r="18" fill="url(#ag)"/>
<text x="44" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="white">C</text>
<text x="70" y="275" font-size="12" font-weight="600" fill="#1e293b">charlie</text>
<text x="70" y="291" font-size="11" fill="#64748b">The voice message feature works great!</text>
<text x="636" y="275" font-size="10" fill="#94a3b8" text-anchor="end">12:10 pm</text>
<text x="636" y="291" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>
<line x1="16" y1="300" x2="650" y2="300" stroke="#f1f5f9" stroke-width="1"/>

<!-- Message row 4 -->
<circle cx="44" cy="322" r="18" fill="url(#ag)"/>
<text x="44" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="white">D</text>
<text x="70" y="317" font-size="12" font-weight="600" fill="#1e293b">diana99</text>
<text x="70" y="333" font-size="11" fill="#64748b">Good morning everyone 👋</text>
<text x="636" y="317" font-size="10" fill="#94a3b8" text-anchor="end">10:22 am</text>
<text x="636" y="333" font-size="14" fill="#cbd5e1" text-anchor="end">›</text>

<!-- Private Messages Card -->
<rect x="16" y="364" width="634" height="226" rx="14" fill="white" filter="url(#sh)"/>
<rect x="16" y="364" width="634" height="46" rx="14" fill="white"/>
<rect x="16" y="392" width="634" height="18" fill="white"/>
<line x1="16" y1="410" x2="650" y2="410" stroke="#e2e8f0" stroke-width="1"/>
