<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/></filter>
  <clipPath id="avatarClip"><circle cx="186" cy="236" r="44"/></clipPath>
</defs>

<rect width="1000" height="600" fill="#f1f5f9"/>

<!-- Header -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="22" fill="#f59e0b">⚡</text>
<text x="74" y="34" font-size="17" font-weight="800" fill="white">FastMessenger</text>
<text x="74" y="50" font-size="9" fill="rgba(255,255,255,0.65)" letter-spacing="0.8">CONNECT &amp; CHAT</text>
<rect x="852" y="16" width="132" height="36" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
<circle cx="876" cy="34" r="13" fill="url(#ag)"/>
<text x="876" y="39" text-anchor="middle" font-size="12" font-weight="700" fill="white">M</text>
<text x="893" y="31" font-size="12" font-weight="700" fill="white">MyUser</text>
<text x="893" y="44" font-size="9" fill="rgba(255,255,255,0.7)">● Online</text>

<!-- Tab Bar -->
<rect y="68" width="1000" height="48" fill="white" filter="url(#sh)"/>
<text x="83" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⌂  Home</text>
<text x="233" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">♥  Friends</text>
<text x="383" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">👥  Members</text>
<text x="533" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">✉  Messages</text>
<text x="683" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">👤  Profile</text>
<rect x="643" y="113" width="80" height="3" rx="2" fill="#4f46e5"/>
<text x="820" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⇥  Logout</text>

<!-- Page title -->
<text x="24" y="143" font-size="18" font-weight="700" fill="#1e293b">Your Profile</text>
<rect x="24" y="148" width="108" height="3" rx="2" fill="#4f46e5"/>

<!-- ── LEFT: Preview Card ── -->
<rect x="16" y="158" width="310" height="400" rx="14" fill="white" filter="url(#sh)"/>
<text x="171" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Preview</text>
<!-- Avatar -->
<circle cx="171" cy="240" r="44" fill="url(#ag)"/>
<text x="171" y="248" text-anchor="middle" font-size="28" font-weight="700" fill="white">M</text>
<!-- border ring -->
<circle cx="171" cy="240" r="46" fill="none" stroke="#818cf8" stroke-width="3"/>
<text x="171" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">MyUser</text>
<text x="171" y="332" text-anchor="middle" font-size="12" fill="#64748b">Full-stack developer &amp; tech</text>
<text x="171" y="348" text-anchor="middle" font-size="12" fill="#64748b">enthusiast. Love building cool</text>
<text x="171" y="364" text-anchor="middle" font-size="12" fill="#64748b">apps with PHP and Bootstrap.</text>

<!-- ── RIGHT: Edit Form ── -->
<rect x="342" y="158" width="642" height="400" rx="14" fill="white" filter="url(#sh)"/>
<text x="366" y="186" font-size="13" font-weight="600" fill="#1e293b">Edit Profile</text>

<!-- Username field -->
<text x="366" y="218" font-size="12" font-weight="600" fill="#1e293b">Username</text>
<rect x="366" y="226" width="594" height="36" rx="8" fill="#f8fafc" stroke="#818cf8" stroke-width="1.8"/>
<text x="382" y="249" font-size="13" fill="#1e293b">MyUser</text>
<text x="366" y="273" font-size="10" fill="#64748b">Leave blank or unchanged to keep current username.</text>

<!-- Bio field -->
<text x="366" y="298" font-size="12" font-weight="600" fill="#1e293b">About You</text>
<rect x="366" y="306" width="594" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="382" y="325" font-size="12" fill="#1e293b">Full-stack developer &amp; tech enthusiast.</text>
<text x="382" y="342" font-size="12" fill="#1e293b">Love building cool apps with PHP</text>
<text x="382" y="359" font-size="12" fill="#1e293b">and Bootstrap.</text>

<!-- Image field -->
<text x="366" y="412" font-size="12" font-weight="600" fill="#1e293b">Profile Image</text>
<rect x="366" y="420" width="594" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="382" y="442" font-size="12" fill="#94a3b8">Choose file… No file chosen</text>
<text x="366" y="467" font-size="10" fill="#64748b">Accepted formats: GIF, JPEG, PNG, WebP</text>

<!-- Save button -->
<rect x="366" y="480" width="140" height="40" rx="8" fill="#4f46e5"/>
<text x="436" y="505" text-anchor="middle" font-size="13" font-weight="600" fill="white">✓ Save Profile</text>
</svg>
