<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.12"/></filter>
</defs>

<rect width="1000" height="580" fill="#f1f5f9"/>

<!-- Header -->
<rect width="1000" height="68" fill="url(#hg)"/>
<rect x="18" y="11" width="46" height="46" rx="13" fill="rgba(255,255,255,0.18)"/>
<text x="41" y="42" text-anchor="middle" font-size="22" fill="#f59e0b">⚡</text>
<text x="74" y="34" font-size="17" font-weight="800" fill="white">FastMessenger</text>
<text x="74" y="50" font-size="9" fill="rgba(255,255,255,0.65)" letter-spacing="0.8">CONNECT &amp; CHAT</text>

<!-- Guest Tab Bar -->
<rect y="68" width="1000" height="48" fill="white"/>
<text x="500" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">⌂  Home</text>
<text x="640" y="99" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">👤  Sign Up</text>
<text x="780" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">⇥  Log In</text>
<rect x="740" y="113" width="80" height="3" rx="2" fill="#4f46e5"/>

<!-- Auth Card -->
<rect x="270" y="130" width="460" height="420" rx="14" fill="white" filter="url(#sh)"/>

<!-- Icon -->
<circle cx="500" cy="190" r="34" fill="rgba(79,70,229,0.1)"/>
<text x="500" y="200" text-anchor="middle" font-size="28" fill="#4f46e5">⇥</text>

<text x="500" y="242" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">Log In</text>
<text x="500" y="262" text-anchor="middle" font-size="12" fill="#64748b">Enter your credentials to continue</text>

<!-- Username field -->
<text x="294" y="294" font-size="12" font-weight="600" fill="#1e293b">Username</text>
<rect x="294" y="302" width="412" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="310" y="327" font-size="13" fill="#94a3b8">Enter your username</text>

<!-- Password field -->
<text x="294" y="362" font-size="12" font-weight="600" fill="#1e293b">Password</text>
<rect x="294" y="370" width="412" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="310" y="395" font-size="13" fill="#94a3b8">••••••••</text>

<!-- Login button -->
<rect x="294" y="428" width="412" height="44" rx="8" fill="#4f46e5"/>
<text x="500" y="455" text-anchor="middle" font-size="14" font-weight="600" fill="white">⇥ Log In</text>

<!-- Forgot password -->
<text x="500" y="492" text-anchor="middle" font-size="12" fill="#64748b">🔑 Forgot your password?</text>

<!-- Sign up link -->
<text x="500" y="520" text-anchor="middle" font-size="12" fill="#64748b">Don't have an account? <tspan font-weight="700" fill="#4f46e5">Sign Up</tspan></text>
</svg>
