<svg viewBox="0 0 520 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
<defs>
  <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#94a3b8" flood-opacity="0.15"/>
  </filter>
</defs>

<!-- Background -->
<rect width="520" height="600" fill="#eef0f7"/>

<!-- Card -->
<rect x="16" y="16" width="488" height="568" rx="22" fill="white" filter="url(#shadow)"/>

<!-- Login icon: box-arrow-in-right (pure SVG) -->
<!-- Left door frame (3 sides open on right) -->
<path d="M250,72 L242,72 Q238,72 238,76 L238,116 Q238,120 242,120 L250,120"
      stroke="#4f46e5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Right vertical bar -->
<line x1="278" y1="72" x2="278" y2="120" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
<!-- Arrow pointing right into box -->
<line x1="255" y1="96" x2="274" y2="96" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
<polyline points="268,90 274,96 268,102" stroke="#4f46e5" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>

<!-- Title -->
<text x="260" y="156" text-anchor="middle" font-size="26" font-weight="800" fill="#1e293b">Log In</text>

<!-- Subtitle (blue, matches screenshot) -->
<text x="260" y="178" text-anchor="middle" font-size="13.5" fill="#4f46e5">Enter your credentials to continue</text>

<!-- Username label -->
<text x="52" y="222" font-size="13.5" font-weight="600" fill="#1e293b">Username</text>
<!-- Username input -->
<rect x="52" y="230" width="416" height="46" rx="10" fill="white" stroke="#dee2e6" stroke-width="1.5"/>

<!-- Password label -->
<text x="52" y="300" font-size="13.5" font-weight="600" fill="#1e293b">Password</text>
<!-- Password input -->
<rect x="52" y="308" width="416" height="46" rx="10" fill="white" stroke="#dee2e6" stroke-width="1.5"/>

<!-- Log In button -->
<rect x="52" y="376" width="416" height="52" rx="10" fill="#4f46e5"/>
<!-- Small box-arrow icon in button -->
<g stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(163, 394)">
  <path d="M8,0 L3,0 Q1,0 1,2 L1,14 Q1,16 3,16 L8,16"/>
  <line x1="10" y1="8" x2="20" y2="8"/>
  <polyline points="16,4 20,8 16,12"/>
</g>
<text x="272" y="408" text-anchor="middle" font-size="15" font-weight="600" fill="white">Log In</text>

<!-- Forgot password (key icon + underlined link) -->
<g transform="translate(184, 447)" stroke="#64748b" stroke-width="1.8" fill="none" stroke-linecap="round">
  <circle cx="0" cy="5" r="5"/>
  <line x1="5" y1="5" x2="14" y2="5"/>
  <line x1="11" y1="5" x2="11" y2="8"/>
  <line x1="14" y1="5" x2="14" y2="8"/>
</g>
<text x="265" y="454" text-anchor="middle" font-size="13" fill="#64748b" text-decoration="underline">Forgot your password?</text>

<!-- Sign Up link -->
<text x="260" y="492" text-anchor="middle" font-size="13" fill="#475569">Don&#39;t have an account? <tspan font-weight="700" fill="#4f46e5">Sign Up</tspan></text>
</svg>
