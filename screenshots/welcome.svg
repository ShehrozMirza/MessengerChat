<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
<defs>
  <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="50%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="50%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4ade80"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000000" flood-opacity="0.06"/>
  </filter>
  <filter id="glow">
    <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#4f46e5" flood-opacity="0.35"/>
  </filter>
  <filter id="greenGlow">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#22c55e" flood-opacity="0.4"/>
  </filter>
</defs>

<!-- ── Background (app behind dimmed overlay) ── -->
<rect width="1000" height="660" fill="#f1f5f9"/>

<!-- Blurred app header (background) -->
<rect width="1000" height="68" fill="url(#hg)" opacity="0.4"/>
<rect y="68" width="1000" height="48" fill="white" opacity="0.4"/>

<!-- Dimmed overlay -->
<rect width="1000" height="660" fill="#1e1b4b" opacity="0.55"/>

<!-- ── Confetti particles ── -->
<rect x="120" y="80"  width="8"  height="13" rx="2" fill="#818cf8" opacity="0.85" transform="rotate(20,124,86)"/>
<rect x="200" y="50"  width="7"  height="11" rx="2" fill="#fbbf24" opacity="0.9"  transform="rotate(-15,203,55)"/>
<rect x="310" y="110" width="6"  height="10" rx="2" fill="#f472b6" opacity="0.8"  transform="rotate(35,313,115)"/>
<rect x="430" y="60"  width="9"  height="14" rx="2" fill="#34d399" opacity="0.85" transform="rotate(-25,434,67)"/>
<rect x="560" y="90"  width="7"  height="11" rx="2" fill="#60a5fa" opacity="0.8"  transform="rotate(10,563,95)"/>
<rect x="670" y="55"  width="8"  height="12" rx="2" fill="#a78bfa" opacity="0.9"  transform="rotate(-30,674,61)"/>
<rect x="780" y="100" width="6"  height="10" rx="2" fill="#fbbf24" opacity="0.85" transform="rotate(18,783,105)"/>
<rect x="870" y="70"  width="9"  height="13" rx="2" fill="#f472b6" opacity="0.8"  transform="rotate(-12,874,76)"/>
<circle cx="155" cy="140" r="5" fill="#4ade80" opacity="0.8"/>
<circle cx="845" cy="130" r="4" fill="#38bdf8" opacity="0.8"/>
<circle cx="260" cy="580" r="5" fill="#fbbf24" opacity="0.7"/>
<circle cx="740" cy="570" r="4" fill="#f472b6" opacity="0.75"/>
<rect x="90"  y="540" width="7"  height="11" rx="2" fill="#818cf8" opacity="0.7" transform="rotate(25,93,545)"/>
<rect x="900" y="550" width="8"  height="12" rx="2" fill="#34d399" opacity="0.7" transform="rotate(-20,904,556)"/>
<rect x="480" y="580" width="6"  height="9"  rx="2" fill="#60a5fa" opacity="0.65" transform="rotate(15,483,584)"/>

<!-- ── Modal card ── -->
<rect x="220" y="100" width="560" height="460" rx="24" fill="url(#mg)" filter="url(#glow)"/>

<!-- Orb 1 (top-left glow) -->
<circle cx="280" cy="165" r="90" fill="#818cf8" opacity="0.22"/>
<!-- Orb 2 (bottom-right glow) -->
<circle cx="740" cy="510" r="80" fill="#f472b6" opacity="0.18"/>
<!-- Orb 3 (mid accent) -->
<circle cx="620" cy="260" r="60" fill="#34d399" opacity="0.12"/>

<!-- ── Stars badge row ── -->
<text x="500" y="155" text-anchor="middle" font-size="22" fill="#ffd700">&#10024;</text>
<text x="500" y="183" text-anchor="middle" font-size="18" font-weight="800" fill="white" letter-spacing="-0.3">Welcome to FastMessenger!</text>

<!-- ── Animated check circle ── -->
<!-- Outer glow ring -->
<circle cx="500" cy="282" r="56" fill="none" stroke="rgba(74,222,128,0.25)" stroke-width="10"/>
<!-- Green circle -->
<circle cx="500" cy="282" r="46" fill="url(#gg)" filter="url(#greenGlow)"/>
<!-- Check mark -->
<polyline points="476,282 494,300 526,262" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
<!-- SVG ring stroke (progress indicator look) -->
<circle cx="500" cy="282" r="50" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="314" stroke-dashoffset="0" opacity="0.6"/>

<!-- ── Badge ── -->
<rect x="390" y="352" width="220" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
<text x="500" y="371" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="0.5">&#10024; ACCOUNT CREATED</text>

<!-- ── Title ── -->
<text x="500" y="410" text-anchor="middle" font-size="26" font-weight="800" fill="white" letter-spacing="-0.5">Welcome aboard!</text>

<!-- ── Description ── -->
<text x="500" y="440" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.75)">Your FastMessenger account is ready.</text>
<text x="500" y="458" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.75)">Start connecting, messaging &amp; building your network.</text>

<!-- ── Enter button ── -->
<rect x="360" y="482" width="280" height="52" rx="26" fill="white" filter="url(#card)"/>
<text x="500" y="514" text-anchor="middle" font-size="15" font-weight="700" fill="#4f46e5">&#9889; Enter FastMessenger</text>
</svg>
